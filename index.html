<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dany niña ❤️</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; }

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:linear-gradient(135deg,#3b73eb,#3e4af8);
    position:relative;
}

/* ════════════════════════════
   PANTALLA PRINCIPAL
════════════════════════════ */
#pantalla-principal{
    transition: opacity 0.5s, transform 0.5s;
}
#pantalla-principal.oculta{
    opacity:0;
    transform:scale(0.9);
    pointer-events:none;
    position:absolute;
}

.card{
    width:480px;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);
    text-align:center;
    color:white;
    box-shadow:0 8px 30px rgba(0,0,0,0.2);
    animation:float 4s ease-in-out infinite;
    position:relative;
    z-index:10;
}

@keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-10px); }
}

h1{ margin-bottom:20px; font-size:2rem; }
p{ line-height:1.7; font-size:1.1rem; }

.botones-fila{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

button{
    border:none;
    padding:12px 16px;
    border-radius:50px;
    cursor:pointer;
    background:white;
    color:#ff4d6d;
    font-size:0.88rem;
    transition:0.3s;
    white-space:nowrap;
}
button:hover{ transform:scale(1.1); }

.botones-fila button{
    flex:1;
    max-width:140px;
}

.btn-ciao{ font-style:italic; }
.btn-contador{ line-height:1.4; font-size:0.78rem !important; }

.hidden{ display:none; opacity:0; margin-top:20px; transition:1s; }
.show{ display:block; opacity:1; }

.music{ margin-top:20px; font-size:0.9rem; opacity:0.8; }

/* Botón dorado integrado en la fila de botones */
#btn-mensaje-final {
    display: none; /* Se controla dinámicamente por JavaScript */
    background: linear-gradient(135deg, #ffe066, #ffb347);
    color: #5a3000;
    font-weight: bold;
    box-shadow: 0 4px 18px rgba(255,200,50,0.45);
    animation: pulseGold 2s ease-in-out infinite;
}
@keyframes pulseGold {
    0%,100% { box-shadow: 0 4px 18px rgba(255,200,50,0.45); transform: scale(1); }
    50%      { box-shadow: 0 6px 28px rgba(255,200,50,0.8); transform: scale(1.05); }
}
#btn-mensaje-final:hover { transform: scale(1.1) !important; }

/* ════════════════════════════
   PANTALLA CARRUSEL
════════════════════════════ */
#pantalla-carousel{
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
    position:absolute;
    top:0; left:0;
    opacity:0;
    transform:scale(1.05);
    transition: opacity 0.5s, transform 0.5s;
    z-index:20;
    padding:20px;
}
#pantalla-carousel.visible{
    opacity:1;
    transform:scale(1);
}

.carousel-wrapper{
    position:relative;
    width:520px;
    max-width:95vw;
}

.carousel-title{
    color:white;
    font-size:1.5rem;
    font-weight:bold;
    text-align:center;
    margin-bottom:18px;
    text-shadow:0 2px 8px rgba(0,0,0,0.2);
}

.carousel-track-container{
    overflow:hidden;
    border-radius:24px;
}
.carousel-track{
    display:flex;
    transition: transform 0.45s cubic-bezier(.77,0,.18,1);
}

.persona-card{
    min-width:100%;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(12px);
    border-radius:24px;
    padding:28px 24px 24px;
    text-align:center;
    color:white;
    box-shadow:0 8px 30px rgba(0,0,0,0.15);
}

.btn-nombre{
    background:white;
    color:#ff4d6d;
    border:none;
    border-radius:50px;
    padding:10px 28px;
    font-size:1.1rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    margin-bottom:18px;
    display:inline-block;
}
